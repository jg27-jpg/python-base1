<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VanControl - Com Fotos</title>
    <style>
        :root { --primary: #fbc02d; --dark: #2c3e50; --success: #27ae60; --bg: #f4f7f6; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; }
        body { background: var(--bg); padding-bottom: 30px; }

        .header { background: var(--dark); color: white; padding: 20px; text-align: center; }
        .container { padding: 15px; max-width: 500px; margin: auto; }

        /* Estilo do Card com Foto */
        .card { 
            background: rgb(255, 255, 255); 
            border-radius: 15px; 
            padding: 15px; 
            margin-bottom: 15px; 
            display: flex; 
            align-items: center; 
            gap: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .student-photo { 
            width: 70px; 
            height: 70px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 3px solid var(--primary);
            background: #eee;
        }

        .info { flex: 1; }
        .info strong { font-size: 18px; display: block; }
        .info small { color: #666; font-size: 12px; }

        /* Estilo do Input de Foto no Cadastro */
        .photo-upload {
            border: 2px dashed #ccc;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .btn-action {
            background: var(--success);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
        }

        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; }
        .btn-save { background: var(--dark); color: white; width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Gestão de Alunos</h2>
    </div>

    <div class="container">
        <div id="form-cadastro">
            <h3>Cadastrar Aluno</h3>
            
            <div class="photo-upload" onclick="document.getElementById('fileInput').click()">
                <span id="photo-label">📸 Clique para adicionar foto</span>
                <input type="file" id="fileInput" hidden accept="image/*" onchange="previewImage(event)">
                <img id="preview" style="display:none; width: 80px; height: 80px; border-radius: 50%; margin: 10px auto;">
            </div>

            <input type="text" id="nome" placeholder="Nome da criança">
            <input type="text" id="escola" placeholder="Escola">
            <button class="btn-save" onclick="salvarAluno()">SALVAR NO SISTEMA</button>
        </div>

        <hr style="margin: 30px 0; border: 0; border-top: 1px solid #ccc;">

        <h3>Lista de Embarque</h3>
        <div id="lista-alunos">
            </div>
    </div>

    <script>
        let alunos = JSON.parse(localStorage.getItem('alunos_fotos')) || [];
        let tempFoto = "";

        // Função para ler a imagem e transformar em texto (Base64) para o navegador salvar
        function previewImage(event) {
            const reader = new FileReader();
            reader.onload = function() {
                const preview = document.getElementById('preview');
                preview.src = reader.result;
                preview.style.display = 'block';
                document.getElementById('photo-label').style.display = 'none';
                tempFoto = reader.result; // Salva a imagem temporariamente
            }
            reader.readAsDataURL(event.target.files[0]);
        }

        function salvarAluno() {
            const nome = document.getElementById('nome').value;
            const escola = document.getElementById('escola').value;

            if(!nome || !tempFoto) {
                alert("Por favor, preencha o nome e adicione uma foto!");
                return;
            }

            const novoAluno = { nome, escola, foto: tempFoto };
            alunos.push(novoAluno);
            localStorage.setItem('alunos_fotos', JSON.stringify(alunos));
            
            alert("Aluno salvo com sucesso!");
            location.reload();
        }

        function renderAlunos() {
            const lista = document.getElementById('lista-alunos');
            if(alunos.length === 0) {
                lista.innerHTML = "<p>Nenhum aluno cadastrado.</p>";
                return;
            }

            lista.innerHTML = alunos.map(aluno => `
                <div class="card">
                    <img src="${aluno.foto}" class="student-photo">
                    <div class="info">
                        <strong>${aluno.nome}</strong>
                        <small>${aluno.escola}</small>
                    </div>
                    <button class="btn-action" onclick="alert('Pai de ${aluno.nome} notificado!')">NOTIFICAR</button>
                </div>
            `).join('');
        }

        renderAlunos();
    </script>
</body>
</html>
